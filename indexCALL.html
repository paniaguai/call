<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤙 Call PawZ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(232,137,43,0.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(45,140,255,0.07) 0%, transparent 50%);
      pointer-events: none;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      padding: 48px 56px 44px;
      border-radius: 32px;
      background: #fff;
      box-shadow: 0 8px 48px rgba(45,140,255,0.10), 0 2px 8px rgba(0,0,0,0.06);
      border: 1.5px solid rgba(45,140,255,0.10);
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), box-shadow 0.28s ease;
      max-width: 380px;
      width: 90vw;
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    a.card:hover {
      transform: translateY(-8px) scale(1.025);
      box-shadow: 0 24px 64px rgba(45,140,255,0.18), 0 4px 16px rgba(0,0,0,0.08);
    }
    a.card:active { transform: translateY(-2px) scale(1.01); }
    .main-img {
      width: 100%;
      max-width: 300px;
      height: auto;
      animation: floatCat 4s ease-in-out infinite;
      filter: drop-shadow(0 12px 24px rgba(232,137,43,0.15));
    }
    .cta {
      margin-top: 24px;
      padding: 13px 36px;
      background: #2D8CFF;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 100px;
      letter-spacing: 0.01em;
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 4px 16px rgba(45,140,255,0.30);
    }
    a.card:hover .cta { background: #1a7ae8; transform: scale(1.05); }
    @keyframes floatCat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
